name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check crawlr tests

      - name: Type check (mypy)
        run: mypy crawlr

      - name: Run tests (pytest + coverage)
        run: pytest -q --cov=crawlr --cov-report=term-missing --cov-fail-under=70

  postgres-smoke:
    name: Postgres smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crawlr
          POSTGRES_PASSWORD: crawlr
          POSTGRES_DB: crawlr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (with Postgres extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,postgres]'

      - name: Postgres backend smoke test
        env:
          CRAWLR_TEST_DATABASE_URL: postgresql://crawlr:crawlr@localhost:5432/crawlr
        run: pytest tests/test_postgres_smoke.py -q
