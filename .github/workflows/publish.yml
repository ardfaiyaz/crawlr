name: Publish to PyPI

# Publishes to PyPI when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API tokens/secrets required.
# One-time setup on PyPI: Project -> Publishing -> add a GitHub publisher with
#   owner: ardfaiyaz, repo: crawlr, workflow: publish.yml, environment: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set package version from the git tag
        run: |
          python - <<'PY'
          import os, re, pathlib
          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          path = pathlib.Path("pyproject.toml")
          text = re.sub(r'(?m)^version = ".*"$', f'version = "{version}"', path.read_text(), count=1)
          path.write_text(text)
          print(f"Publishing crawlr {version} (from tag {os.environ['GITHUB_REF_NAME']})")
          PY
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
